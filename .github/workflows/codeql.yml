# ============================================================================
# CodeQL Security Analysis
# ============================================================================
# Performs static analysis for security vulnerabilities using GitHub CodeQL.
# Scans Java (backend) and JavaScript/TypeScript (frontend) code.
# ============================================================================

name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Run every Wednesday at 04:00 UTC
    - cron: "0 4 * * 3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── CodeQL Analysis — Java (Backend) ──────────────────────────────────────
  analyze-java:
    name: CodeQL — Java Backend
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          queries: security-and-quality

      - name: Build backend
        working-directory: backend
        run: mvn clean compile -B -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java"

  # ── CodeQL Analysis — JavaScript/TypeScript (Frontend) ────────────────────
  analyze-javascript:
    name: CodeQL — JavaScript/TypeScript Frontend
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

