# ============================================================================
# Dependency Updates Check
# ============================================================================
# Checks for outdated dependencies in both backend (Maven) and
# frontend (npm) and reports them. Runs on schedule and manually.
# ============================================================================

name: Dependency Updates

on:
  workflow_dispatch:
  schedule:
    # Run every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

jobs:
  # ── Backend Dependency Check ──────────────────────────────────────────────
  backend-dependencies:
    name: Backend — Check Maven Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Check for dependency updates
        run: mvn versions:display-dependency-updates -B

      - name: Check for plugin updates
        run: mvn versions:display-plugin-updates -B

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check -B \
            -DfailBuildOnCVSS=9 \
            -Dformats=HTML,JSON || true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: owasp-dependency-report
          path: backend/target/dependency-check-report.*
          retention-days: 30

  # ── Frontend Dependency Check ─────────────────────────────────────────────
  frontend-dependencies:
    name: Frontend — Check npm Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check outdated packages
        run: npm outdated || true

      - name: Audit dependencies
        run: npm audit --audit-level=high || true

      - name: Generate audit report
        run: npm audit --json > audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: frontend/audit-report.json
          retention-days: 30

